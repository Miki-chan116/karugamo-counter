<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルガモカウンター</title>

<style>
:root {
  --green-main:#0b5a35;
  --green-dark:#084526;
  --accent-orange:#ff8c1a;
  --accent-yellow:#ffe600;
  --white:#ffffff;
  --gray:#e0e0e0;
  --divider-color: rgba(255,255,255,0.3);
}

body {
  margin:0;
  background:var(--green-main);
  color:var(--white);
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI",
               Roboto, "Noto Sans JP", sans-serif;
  font-variant-numeric: tabular-nums;
}

/* ===== ヘッダー ===== */
header {
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:64px;
  background:var(--white);
  color:#000;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  z-index:10;
}

header .date {
  font-size:20px;
  font-weight:bold;
}

header button {
  font-size:14px;
  padding:6px 10px;
}

/* 12H / 24H 切り替えボタン */
.time-toggle {
  min-height: 40px;
  padding: 0 14px;

  border-radius: 999px;
  border: 1px solid var(--divider-color);
  background: transparent;

  font-size: 14px;
  font-weight: bold;
  color: #666;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
}

/* 選択中 */
.time-toggle.active {
  background: var(--gray);
  border-color: var(--divider-color);
  color: #000;
}

/* ===== フッター ===== */
footer {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:64px;
  background:var(--white);
  display:flex;
}

footer button {
  flex:1;
  font-size:18px;
  border:none;
}

.edit-btn {
  background:#ddd;
  font-weight:bold;
}

.send-btn {
  background:var(--accent-orange);
  color:#000;
  font-weight:bold;
}

/* ===== メイン ===== */
main {
  padding:80px 16px 120px;
}

.log {
  border-bottom: 1px solid var(--divider-color);
  padding:16px 0;
}

.time-row {
  display:flex;
  align-items:center;
  justify-content: space-between;
}

.time {
  font-size:64px;
  font-weight:bold;
  line-height:1;
}

.count {
  margin-left:12px;
  width:40px;
  height:40px;
  border-radius:50%;
  background: transparent;
  border: 1px solid var(--divider-color);
  color: #eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:18px;
}

.log.latest .count {
  border-color: var(--accent-orange);
  color: var(--accent-orange);
}

.elapsed {
  color:var(--accent-yellow);
  text-align: right;
  margin-left:6px;
  margin-top:4px;
  font-size:18px;
}

/* ===== 打刻ボタン ===== */
.stamp-btn {
  position:sticky;
  bottom:80px;
  margin:32px auto 0;
  display:block;
  font-size:22px;
  font-weight:bold;
  padding:14px 24px;
  background-color: rgba(255, 255, 255, 0.85); /* ← 少し透かす */
  color:#000;
  border:none;
}

.btn {
  border-radius: 12px;
}

</style>
</head>

<body>

<header>
  <div class="date">🦆 2026年4月23日（木）</div>
  <button class="time-toggle active">12H</button>
</header>

<main>

  <div class="log latest">
    <div class="time-row">
      <div class="time">17:15</div>
      <div class="count">3</div>
    </div>
    <div class="elapsed">62分</div>
  </div>

  <div class="log">
    <div class="time-row">
      <div class="time">16:13</div>
      <div class="count">2</div>
    </div>
    <div class="elapsed">61分</div>
  </div>

  <div class="log">
    <div class="time-row">
      <div class="time">15:12</div>
      <div class="count">1</div>
    </div>
  </div>

  <button class="stamp-btn btn">➕ 打刻する</button>

</main>

<footer>
  <button class="edit-btn">修正する</button>
  <button class="send-btn">📤 データを送る</button>
</footer>

<script>
const dateEl = document.querySelector('.date');

const now = new Date();
const year = now.getFullYear();
const month = now.getMonth() + 1;
const day = now.getDate();
const weekday = ['日','月','火','水','木','金','土'][now.getDay()];
dateEl.textContent = `🦆 ${year}年${month}月${day}日（${weekday}）`;
</script>

</body>
</html>
